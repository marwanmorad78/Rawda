<div class="form-field" data-field-wrapper>
    <label for="{{ field.id_for_label }}" class="field-label">{{ field.label }}</label>
    <span class="password-field" data-password-field>
        {{ field }}
        <button
            type="button"
            class="password-toggle"
            data-password-toggle
            data-show-label="{{ ui.show_password }}"
            data-hide-label="{{ ui.hide_password }}"
            aria-label="{{ ui.show_password }}"
            title="{{ ui.show_password }}"
        >
            <svg viewBox="0 0 24 24" role="presentation" focusable="false" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
        </button>
    </span>
    {{ field.errors }}
</div>
