{% extends "dashboard/base.html" %}

{% block content %}
<section class="panel panel-narrow">
    <h1>{{ page_title }}</h1>
    <form method="post" enctype="multipart/form-data" class="stack-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            {% include "partials/dashboard_form_field.html" with field=field %}
        {% endfor %}
        <button type="submit" class="btn btn-primary">{{ submit_label|default:dashboard_ui.save_changes }}</button>
    </form>
</section>
{% endblock %}
